<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="120" fill="#1a1a1a" />
  
  <!-- Subtle inner border/ring in gold -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#d4a843" stroke-width="4" opacity="0.15"/>
  
  <!-- Gold circular badge background -->
  <circle cx="256" cy="220" r="110" fill="#222221" stroke="#d4a843" stroke-width="3" />
  
  <!-- Scissors in White/Gold -->
  <g transform="translate(256, 220) rotate(-45)">
    <!-- Blade 1 -->
    <path d="M -15, -110 L -5, 0 L -25, 30 C -45, 45 -45, 75 -25, 90 C -5, 105 25, 105 35, 80 L 15, 30 Z" fill="#ffffff" stroke="#d4a843" stroke-width="3" />
    <!-- Finger Hole 1 -->
    <circle cx="5" cy="70" r="13" fill="#1a1a1a" stroke="#d4a843" stroke-width="3" />
    
    <!-- Blade 2 -->
    <path d="M 15, -110 L 5, 0 L 25, 30 C 45, 45 45, 75 25, 90 C 5, 105 -25, 105 -35, 80 L -15, 30 Z" fill="#ffffff" stroke="#d4a843" stroke-width="3" transform="scale(-1, 1)" />
    <!-- Finger Hole 2 -->
    <circle cx="-5" cy="70" r="13" fill="#1a1a1a" stroke="#d4a843" stroke-width="3" transform="scale(-1, 1)" />
  </g>
  
  <!-- Banner text BP -->
  <rect x="186" y="340" width="140" height="50" rx="10" fill="#d4a843" />
  <text x="256" y="376" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="36" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">BP</text>
  
  <text x="256" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="4">BARBER_PRO</text>
</svg>